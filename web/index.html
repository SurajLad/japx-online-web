<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="JSON API Parser online is a tool for converting complex JSON:API structure into simple JSON based on Flutter Japx.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="JSON API Parser JAPX">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>JSON API Parser JAPX - Decoder Online</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0D1117;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      background-color: #0D1117;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .logo-box {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #7C3AED 0%, #9F67FF 100%);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 40px rgba(124, 58, 237, 0.3);
      margin-bottom: 40px;
      animation: pulse 2.5s infinite ease-in-out;
    }

    .logo-text {
      color: white;
      font-size: 28px;
      font-weight: 700;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(124, 58, 237, 0.1);
      border-top: 2px solid #7C3AED;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }

    #loading-text {
      color: #8B949E;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-align: center;
      min-height: 20px;
      transition: opacity 0.3s ease;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 10px 40px rgba(124, 58, 237, 0.3);
      }

      50% {
        transform: scale(1.04);
        box-shadow: 0 15px 50px rgba(124, 58, 237, 0.5);
      }

      100% {
        transform: scale(1);
        box-shadow: 0 10px 40px rgba(124, 58, 237, 0.3);
      }
    }

    .fade-out {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="loading-container">
    <div class="logo-box">
      <span class="logo-text">{/}</span>
    </div>
    <div class="spinner"></div>
    <div id="loading-text">Initializing..</div>
  </div>

  <script>
    const messages = [
      "Initializing..",
      "Fueling spaceship to launch..",
      "Flattening nested dimensions..",
      "Optimizing JSON streams..",
      "Decoding reality..",
      "Preparing for liftoff..",
      "Warping through nested structures.."
    ];
    let messageIndex = 0;
    const textElement = document.getElementById('loading-text');

    const updateText = () => {
      textElement.style.opacity = 0;
      setTimeout(() => {
        messageIndex = (messageIndex + 1) % messages.length;
        textElement.innerText = messages[messageIndex];
        textElement.style.opacity = 1;
      }, 300);
    };

    const textInterval = setInterval(updateText, 2200);

    const hideLoader = () => {
      const loader = document.getElementById('loading-container');
      loader.classList.add('fade-out');
      clearInterval(textInterval);
      setTimeout(() => {
        loader.remove();
      }, 800);
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCCh-txFiEul3-AKZTeDHvcnsk-_P7CReY",
      authDomain: "json-api-parser-jpax.firebaseapp.com",
      projectId: "json-api-parser-jpax",
      storageBucket: "json-api-parser-jpax.firebasestorage.app",
      messagingSenderId: "743955942711",
      appId: "1:743955942711:web:65763b4147db41df79deb2",
      measurementId: "G-19GD2GKM5Y"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
  </script>

  <script>
    window.addEventListener('load', function () {
      if (window._flutter && window._flutter.loader) {
        window._flutter.loader.load({
          onEntrypointLoaded: async function (engineInitializer) {
            const appRunner = await engineInitializer.initializeEngine();
            await appRunner.runApp();
            setTimeout(hideLoader, 500);
          }
        });
      } else {
        window.addEventListener('flutter-first-frame', hideLoader);
      }
    });
  </script>
</body>

</html>
